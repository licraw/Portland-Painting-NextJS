name: Update Google Reviews

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

permissions:
  contents: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and write Google reviews
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: node scripts/fetch-google-reviews.mjs

      - name: Commit updated reviews file
        run: |
          if git diff --quiet -- src/data/google-reviews.json; then
            echo "No review changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/google-reviews.json
          git commit -m "chore: update google reviews snapshot"
          git push
